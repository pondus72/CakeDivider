name: Build STL

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.diameter }}mm / ${{ matrix.slices }} slices / split ${{ matrix.split }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - diameter: 180
            slices: 6
            split: 2
          - diameter: 260
            slices: 8
            split: 4
          - diameter: 300
            slices: 10
            split: 2
          - diameter: 360
            slices: 12
            split: 4

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install native runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build STEP and STL exports
        run: |
          python scripts/build.py \
            --diameter ${{ matrix.diameter }} \
            --slices ${{ matrix.slices }} \
            --split ${{ matrix.split }} \
            --formats stl step \
            --output-dir dist/${{ matrix.diameter }}mm-${{ matrix.slices }}-slices-split${{ matrix.split }}

      - name: Upload generated models
        uses: actions/upload-artifact@v4
        with:
          name: cake-divider-${{ matrix.diameter }}mm-${{ matrix.slices }}-slices-split${{ matrix.split }}
          path: dist/**/*.*
          if-no-files-found: error
